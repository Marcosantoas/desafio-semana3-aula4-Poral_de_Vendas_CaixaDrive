<h2 class="titulo">Meu Perfil</h2>

<div class="card-perfil">
  <p><strong>Nome:</strong> {{ authService.usuario()?.nome }}</p>
  <p><strong>Email:</strong> {{ authService.usuario()?.email }}</p>
  <p><strong>Perfil:</strong> {{ authService.usuario()?.perfil }}</p>
</div>

<h3 class="subtitulo">Veículos Reservados</h3>

<div *ngIf="reservaService.totalReservas() === 0" class="vazio">
  Nenhum veículo reservado.
</div>

<div class="lista">

  <div class="card-reserva"
       *ngFor="let veiculo of reservaService.reservas()">

    <h4>{{ veiculo.modelo }}</h4>
    <p class="preco">
      {{ veiculo.preco | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}
    </p>

    <button class="remover"
            (click)="reservaService.remover(veiculo.id)">
      Remover
    </button>

  </div>

</div>

<div *ngIf="reservaService.totalReservas() > 0" class="acoes">
  <button class="limpar"
          (click)="reservaService.limpar()">
    Limpar Todas as Reservas
  </button>
</div>
